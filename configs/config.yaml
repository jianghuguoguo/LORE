# LORE User Required Configuration
# =============================================================
# 目的：集中放置用户部署时必须填写/确认的参数。
#
# 文件角色：
# 1) 本文件（config.yaml）只放“用户必填项”：
#    - LLM API 接入参数
#    - RAGflow API 接入参数
#    - RAGflow 知识库 ID 路由
# 2) 设计级参数（如 tool_categories、解析规则、调度默认值）
#    统一维护在 configs/design.yaml。
#
# 安全建议：
# - 优先使用环境变量注入密钥（api_key_env），避免明文写入仓库。
# - 不要将真实密钥提交到版本控制。

# ─────────────────────────────────────────────────────────────
# 1. LLM 接入（必填）
# ─────────────────────────────────────────────────────────────
llm:
  # 提供商标识（仅用于标签与日志）
  provider: "generic"

  # 模型与 OpenAI 兼容 API 地址
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com"

  # 密钥解析优先级：环境变量 > api_key_literal
  api_key_env: "LLM_API_KEY"
  api_key_literal: "sk-2b92e4e8e7d04ae19532fd12fe3f4ac9"

  # 推理参数
  temperature: 0.0
  max_tokens: 2048
  max_retries: 3
  retry_delay: 2.0
  timeout: 60

# ─────────────────────────────────────────────────────────────
# 2. RAGflow 接入与知识库路由（必填）
# ─────────────────────────────────────────────────────────────
ragflow:
  # 主机地址（支持 http://host 或 http://host/api/v1）
  base_url: "http://8.140.33.83"
  base_url_env: "RAGFLOW_BASE_URL"

  # 密钥解析优先级：环境变量 > api_key_literal
  api_key_env: "RAGFLOW_API_KEY"
  api_key_literal: "ragflow-iB2U1ufs27hLl0FyLPLup-EU6lsjR8afFjA060_SPEs"

  # 网络参数
  request_timeout: 60
  retry_times: 2

  # 知识库 ID 路由（请按你的 RAGflow 实例填写）
  datasets:
    # Layer4 / 回流主库
    experience: "b5f3a66f065f11f1bca40242ac120006"
    # Layer3 分层上传路由
    factual: "30bbf5f11ab811f1aa4e0242ac120006"
    procedural_pos: "0615b25a1ab911f1aa160242ac120006"
    procedural_neg: "fb3f9e7c1ab811f1a1c30242ac120006"
    metacognitive: "0ff97af51ab911f19e1c0242ac120006"
    # 全量归档预留（默认路由不使用）
    full: "b877bec1065c11f1a8960242ac120006"
    # 回流次级库（可为空）
    secondary: ""
